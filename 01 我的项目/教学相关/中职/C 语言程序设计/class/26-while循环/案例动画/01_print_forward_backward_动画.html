<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习1：正向/反向输出 - 执行动画</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        .main-content {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-rows: auto 1fr 1fr;
            gap: 15px;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
        }
        h1 {
            color: white;
            font-size: 1.8em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        .section h2 {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 10px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }
        .code-block {
            background: #2d3748;
            color: #f7fafc;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            flex: 1;
        }
        .code-line {
            padding: 3px 8px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .code-line.highlight {
            background: #667eea;
            font-weight: bold;
        }
        .vars-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .var-box {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: 3px solid #667eea;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            transition: all 0.4s;
        }
        .var-box.changed {
            background: #ffd93d;
            transform: scale(1.05);
        }
        .output {
            background: #1a202c;
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            min-height: 50px;
        }
        .status-box {
            background: #e6f2ff;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-size: 1.05em;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9em;
            flex: 1;
            overflow-y: auto;
        }
        .info-card h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        .info-card ul {
            padding-left: 20px;
        }
        .info-card li {
            margin: 5px 0;
            line-height: 1.4;
        }
        .result-num {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 10px;
            margin: 0 3px;
            border-radius: 5px;
            animation: pop 0.4s ease;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1>练习1：正向/反向输出数字 - while循环演示</h1>

        <!-- 正向输出 -->
        <div class="section">
            <h2>要求1：打印1-5（正向）</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1;">
                <div class="code-block">
                    <div class="code-line" id="f-line-1">int i = 1;</div>
                    <div class="code-line" id="f-line-2">while (i &lt;= 5) {</div>
                    <div class="code-line" id="f-line-3">&nbsp;&nbsp;printf("%d ", i);</div>
                    <div class="code-line" id="f-line-4">&nbsp;&nbsp;i++;</div>
                    <div class="code-line" id="f-line-5">}</div>
                </div>
                <div>
                    <div class="var-box" id="var-i">i = ?</div>
                    <div class="status-box" style="margin-top: 10px;" id="status-f">未开始</div>
                    <div class="output" style="margin-top: 10px;" id="output-f">输出：</div>
                </div>
            </div>
        </div>

        <!-- 反向输出 -->
        <div class="section">
            <h2>要求2：打印5-1（反向）</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1;">
                <div class="code-block">
                    <div class="code-line" id="b-line-1">int j = 5;</div>
                    <div class="code-line" id="b-line-2">while (j &gt;= 1) {</div>
                    <div class="code-line" id="b-line-3">&nbsp;&nbsp;printf("%d ", j);</div>
                    <div class="code-line" id="b-line-4">&nbsp;&nbsp;j--;</div>
                    <div class="code-line" id="b-line-5">}</div>
                </div>
                <div>
                    <div class="var-box" id="var-j">j = ?</div>
                    <div class="status-box" style="margin-top: 10px;" id="status-b">未开始</div>
                    <div class="output" style="margin-top: 10px;" id="output-b">输出：</div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="color: #667eea; text-align: center;">控制面板</h3>

        <div class="btn-group">
            <button onclick="demoForward()">正向-自动演示</button>
            <button onclick="stepForward()">正向-单步执行</button>
            <button onclick="resetForward()">正向-重置</button>
        </div>

        <hr style="border: 1px solid #ddd;">

        <div class="btn-group">
            <button onclick="demoBackward()">反向-自动演示</button>
            <button onclick="stepBackward()">反向-单步执行</button>
            <button onclick="resetBackward()">反向-重置</button>
        </div>

        <hr style="border: 1px solid #ddd;">

        <div class="info-card">
            <h3>知识点</h3>
            <ul>
                <li><strong>正向</strong>：i++ 递增</li>
                <li><strong>反向</strong>：j-- 递减</li>
                <li><strong>条件</strong>：&lt;= 或 &gt;=</li>
                <li>必须更新变量，避免死循环</li>
            </ul>
        </div>
    </div>

    <script>
        let fI = 1, fStep = 0, fOut = [];
        let bJ = 5, bStep = 0, bOut = [];

        function highlightF(lineId) {
            document.querySelectorAll('[id^="f-line-"]').forEach(el => el.classList.remove('highlight'));
            if (lineId) document.getElementById(lineId).classList.add('highlight');
        }

        function highlightB(lineId) {
            document.querySelectorAll('[id^="b-line-"]').forEach(el => el.classList.remove('highlight'));
            if (lineId) document.getElementById(lineId).classList.add('highlight');
        }

        function stepForward() {
            if (fI > 5) { document.getElementById('status-f').textContent = '结束'; return; }

            const s = fStep % 3;
            if (s === 0) {
                highlightF('f-line-2');
                document.getElementById('status-f').textContent = `判断: i(${fI}) <= 5`;
            } else if (s === 1) {
                highlightF('f-line-3');
                fOut.push(fI);
                document.getElementById('output-f').innerHTML = '输出：' + fOut.map(n => `<span class="result-num">${n}</span>`).join('');
                document.getElementById('status-f').textContent = `输出 ${fI}`;
            } else {
                highlightF('f-line-4');
                fI++;
                document.getElementById('var-i').textContent = `i = ${fI}`;
                document.getElementById('var-i').classList.add('changed');
                setTimeout(() => document.getElementById('var-i').classList.remove('changed'), 400);
                document.getElementById('status-f').textContent = `i自增为${fI}`;
            }
            fStep++;
        }

        function demoForward() {
            resetForward();
            const interval = setInterval(() => {
                if (fI <= 5) stepForward();
                else clearInterval(interval);
            }, 800);
        }

        function resetForward() {
            fI = 1; fStep = 0; fOut = [];
            document.getElementById('var-i').textContent = 'i = 1';
            document.getElementById('output-f').textContent = '输出：';
            document.getElementById('status-f').textContent = '已重置';
            highlightF(null);
        }

        function stepBackward() {
            if (bJ < 1) { document.getElementById('status-b').textContent = '结束'; return; }

            const s = bStep % 3;
            if (s === 0) {
                highlightB('b-line-2');
                document.getElementById('status-b').textContent = `判断: j(${bJ}) >= 1`;
            } else if (s === 1) {
                highlightB('b-line-3');
                bOut.push(bJ);
                document.getElementById('output-b').innerHTML = '输出：' + bOut.map(n => `<span class="result-num">${n}</span>`).join('');
                document.getElementById('status-b').textContent = `输出 ${bJ}`;
            } else {
                highlightB('b-line-4');
                bJ--;
                document.getElementById('var-j').textContent = `j = ${bJ}`;
                document.getElementById('var-j').classList.add('changed');
                setTimeout(() => document.getElementById('var-j').classList.remove('changed'), 400);
                document.getElementById('status-b').textContent = `j自减为${bJ}`;
            }
            bStep++;
        }

        function demoBackward() {
            resetBackward();
            const interval = setInterval(() => {
                if (bJ >= 1) stepBackward();
                else clearInterval(interval);
            }, 800);
        }

        function resetBackward() {
            bJ = 5; bStep = 0; bOut = [];
            document.getElementById('var-j').textContent = 'j = 5';
            document.getElementById('output-b').textContent = '输出：';
            document.getElementById('status-b').textContent = '已重置';
            highlightB(null);
        }

        window.onload = () => { resetForward(); resetBackward(); };
    </script>
</body>
</html>
