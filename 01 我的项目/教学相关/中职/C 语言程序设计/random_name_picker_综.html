<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机点名系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .display-area {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 60px 20px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .name-display {
            font-size: 4em;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .rolling {
            animation: roll 0.1s infinite;
        }

        @keyframes roll {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #startBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #resetBtn {
            background: #f39c12;
            color: white;
        }

        #resetBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.4);
        }

        .name-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .name-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
            text-align: center;
            font-size: 1em;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .name-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }

        .name-item.called {
            background: #e0e0e0;
            color: #999;
            text-decoration: line-through;
        }

        .stats {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 1.1em;
        }

        .stats span {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>随机点名系统</h1>

        <div class="display-area">
            <div id="nameDisplay" class="name-display">准备开始</div>
        </div>

        <div class="button-group">
            <button id="startBtn">开始点名</button>
            <button id="resetBtn">重置</button>
        </div>

        <div class="stats">
            已点名: <span id="calledCount">0</span> / 总人数: <span id="totalCount">0</span>
        </div>

        <div class="name-list" id="nameList"></div>
    </div>

    <script>
        const names = [
            '仲曼如', '赵健为', '胡玉蝶', '周帅', '唐天宇',
            '王静茹', '蒋甜甜', '刘沙沙', '王思怡', '刘金秋',
            '丁秋园', '杨欢欢', '范奥同', '范贵阳', '毛俊杰',
            '张佳城', '靳舒雅', '郑梓灵', '孙浩铭', '周好',
            '张雨馨', '梁旭阳', '陈欣茹', '祁斌', '周志刚',
            '丁志茹', '魏书琪', '荣光辉', '姜春林', '张家乐',
            '耿晗', '于嘉旺', '马鑫国', '徐蜜', '董博',
            '陆思伟', '赵自然', '袁嘉乐', '吴文达', '张浩田',
            '方欣冉', '王涵', '汪靖哲', '胡远','林志旺'
        ];

        let availableNames = [...names];
        let calledNames = [];
        let isRolling = false;
        let rollInterval = null;

        const nameDisplay = document.getElementById('nameDisplay');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const nameList = document.getElementById('nameList');
        const calledCount = document.getElementById('calledCount');
        const totalCount = document.getElementById('totalCount');

        function init() {
            renderNameList();
            updateStats();
        }

        function renderNameList() {
            nameList.innerHTML = '';
            names.forEach(name => {
                const div = document.createElement('div');
                div.className = 'name-item';
                div.textContent = name;
                if (calledNames.includes(name)) {
                    div.classList.add('called');
                }
                nameList.appendChild(div);
            });
        }

        function updateStats() {
            calledCount.textContent = calledNames.length;
            totalCount.textContent = names.length;
        }

        function startRolling() {
            if (availableNames.length === 0) {
                alert('所有人都已被点名！');
                return;
            }

            if (!isRolling) {
                // 开始滚动
                isRolling = true;
                startBtn.textContent = '停止';
                nameDisplay.classList.add('rolling');

                rollInterval = setInterval(() => {
                    const randomName = availableNames[Math.floor(Math.random() * availableNames.length)];
                    nameDisplay.textContent = randomName;
                }, 100);
            } else {
                // 停止滚动并选中
                isRolling = false;
                startBtn.textContent = '开始点名';
                nameDisplay.classList.remove('rolling');
                clearInterval(rollInterval);

                // 选择最终名字
                const selectedName = availableNames[Math.floor(Math.random() * availableNames.length)];
                nameDisplay.textContent = selectedName;

                // 更新状态
                availableNames = availableNames.filter(name => name !== selectedName);
                calledNames.push(selectedName);

                // 高亮选中的名字
                highlightSelected(selectedName);
                renderNameList();
                updateStats();

                if (availableNames.length === 0) {
                    startBtn.disabled = true;
                    setTimeout(() => {
                        alert('所有人都已被点名！');
                    }, 500);
                }
            }
        }

        function highlightSelected(name) {
            const items = document.querySelectorAll('.name-item');
            items.forEach(item => {
                item.classList.remove('selected');
                if (item.textContent === name && !item.classList.contains('called')) {
                    item.classList.add('selected');
                }
            });
        }

        function reset() {
            if (isRolling) {
                clearInterval(rollInterval);
                isRolling = false;
            }

            availableNames = [...names];
            calledNames = [];
            nameDisplay.textContent = '准备开始';
            nameDisplay.classList.remove('rolling');
            startBtn.textContent = '开始点名';
            startBtn.disabled = false;

            renderNameList();
            updateStats();
        }

        startBtn.addEventListener('click', startRolling);
        resetBtn.addEventListener('click', reset);

        // 空格键控制开始/停止
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!startBtn.disabled) {
                    startRolling();
                }
            }
        });

        init();
    </script>
</body>
</html>
